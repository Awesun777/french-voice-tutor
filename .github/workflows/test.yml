name: test

# Logic-tier tests only (no secrets). The live tier (*.live.test.ts) is
# excluded by vitest.config.ts and runs separately in nightly-health.yml.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
